# ─────────────────────────────────────────────────────────────────────────────
# Sistema de Auditoria TA — Docker Compose
# Runs: FastAPI backend + Next.js frontend + PostgreSQL
# ─────────────────────────────────────────────────────────────────────────────
services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: auditoria_ta
      POSTGRES_USER: auditoria
      POSTGRES_PASSWORD: auditoria_secret_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auditoria -d auditoria_ta"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend (FastAPI) ───────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://auditoria:auditoria_secret_2026@postgres:5432/auditoria_ta
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Frontend (Next.js) ─────────────────────────────────────────────────────
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
